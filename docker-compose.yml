services:
  pakgun-web:
    build: .
    ports:
      - "3010:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      ENV_PATH: /app/data/.env
      SESSION_COOKIE_SECURE: "false"
      OAUTH_BASE_URL: http://localhost:3010
    volumes:
      - ./data:/app/data
    restart: unless-stopped
